<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
  <title>欢迎来到剧中人的小剧本！ | INS风格</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
  /* 其他样式保持不变 */
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="%23FCBEC3" stroke="%23FF6B8A" stroke-width="1"/></svg>') 12 12, auto;
}

    /* INS风格背景装饰 */
    .ins-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      background: 
        radial-gradient(circle at 15% 20%, rgba(252, 190, 195, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 75%, rgba(207, 222, 227, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 242, 233, 0.25) 0%, transparent 70%);
    }

    /* 几何装饰线条 */
    .geometric-lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.03;
      background-image: 
        linear-gradient(45deg, #8E656F 1px, transparent 1px),
        linear-gradient(-45deg, #8E656F 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .cursor-glow {
      position: fixed;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(252, 190, 195, 0.3) 0%, rgba(207, 222, 227, 0.2) 50%, transparent 80%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      transition: all 0.15s ease;
      mix-blend-mode: overlay;
      backdrop-filter: blur(5px);
    }

    .main-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 16px 30px;
      position: relative;
      min-height: 100vh;
    }

    /* INS风格顶部导航栏 */
    .ins-header {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 35px;
      padding: 20px 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(252, 190, 195, 0.25);
      box-shadow: 0 8px 32px rgba(142, 101, 111, 0.08);
      position: relative;
      overflow: hidden;
    }

    .ins-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent 30%, rgba(252, 190, 195, 0.05) 50%, transparent 70%);
      animation: insShine 6s infinite linear;
    }

    @keyframes insShine {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .profile-section {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
      position: relative;
      z-index: 1;
    }

    .avatar-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #FCBEC3;
      padding: 3px;
      background: linear-gradient(45deg, #FCBEC3, #CFDEE3, #FFF2E9);
      animation: avatarPulse 3s infinite ease-in-out;
      flex-shrink: 0;
    }

    @keyframes avatarPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(252, 190, 195, 0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(252, 190, 195, 0.5); }
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #FFF2E9;
    }

    .profile-info {
      flex: 1;
    }

    .username {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #8E656F 0%, #FCBEC3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .bio {
      font-size: 0.9rem;
      color: #8E656F;
      opacity: 0.8;
      line-height: 1.4;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      font-size: 0.85rem;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-weight: 700;
      color: #8E656F;
    }

    .stat-label {
      color: #CFDEE3;
      font-size: 0.75rem;
    }

    /* INS风格导航按钮 */
    .nav-buttons {
      display: flex;
      justify-content: space-around;
      gap: 8px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 6px;
      margin-bottom: 20px;
      border: 1px solid rgba(207, 222, 227, 0.3);
      box-shadow: 0 5px 20px rgba(142, 101, 111, 0.06);
    }

    .nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: #8E656F;
      padding: 10px 8px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      white-space: nowrap;
    }

    .nav-btn.active {
      background: white;
      color: #FCBEC3;
      box-shadow: 0 4px 15px rgba(252, 190, 195, 0.25);
      transform: scale(1.05);
    }

    .nav-btn:hover:not(.active) {
      background: rgba(252, 190, 195, 0.1);
      transform: translateY(-2px);
    }

    /* 页面容器 */
    .page-container {
      position: relative;
    }

    .page {
      display: none;
      animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .page.active {
      display: block;
    }

    @keyframes fadeInUp {
      from { 
        opacity: 0; 
        transform: translateY(20px);
      }
      to { 
        opacity: 1; 
        transform: translateY(0);
      }
    }

    /* INS风格卡片 */
    .ins-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 20px;
      border: 1px solid rgba(252, 190, 195, 0.2);
      box-shadow: 0 10px 40px rgba(142, 101, 111, 0.06);
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .ins-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 50px rgba(252, 190, 195, 0.15);
      border-color: rgba(252, 190, 195, 0.4);
    }

    /* 介绍页面 */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }

    .gallery-item {
      aspect-ratio: 1/1;
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .gallery-item:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(252, 190, 195, 0.3);
    }

    .gallery-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: linear-gradient(45deg, #FFF2E9, #CFDEE3);
    }

    .gallery-item.main-image-item {
      grid-column: span 2;
      grid-row: span 2;
    }

    .intro-text-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 18px;
      border: 1px solid rgba(207, 222, 227, 0.3);
    }

    .intro-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #8E656F;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .intro-desc {
      color: #5E4B4F;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    /* 妆造页面 */
    .looks-feed {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .look-post {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(15px);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(207, 222, 227, 0.3);
      transition: all 0.3s ease;
    }

    .look-post:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 35px rgba(252, 190, 195, 0.2);
    }

    .look-image-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #FFF2E9 0%, #CFDEE3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      overflow: hidden;
    }

    .look-image-placeholder::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      100% { left: 100%; }
    }

    .look-info {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .look-name {
      font-weight: 600;
      color: #8E656F;
    }

    .like-btn {
      background: none;
      border: none;
      color: #FCBEC3;
      cursor: pointer;
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .like-btn:hover {
      transform: scale(1.2);
    }

    /* 聊天页面 */
    .chat-container {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(252, 190, 195, 0.2);
    }

    .chat-header {
      background: linear-gradient(135deg, #FCBEC3, #CFDEE3);
      padding: 15px 20px;
      color: white;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: white;
    }

    .chat-messages {
      height: 350px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 75%;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
      animation: messageSlide 0.3s ease;
      position: relative;
    }

    @keyframes messageSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #FCBEC3, #F5A0A8);
      color: white;
      border-bottom-right-radius: 5px;
      box-shadow: 0 3px 10px rgba(252, 190, 195, 0.3);
    }

    .message.ai {
      align-self: flex-start;
      background: white;
      color: #5E4B4F;
      border-bottom-left-radius: 5px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      border: 1px solid #CFDEE3;
    }

    .message-time {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-top: 4px;
    }

    .chat-input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      background: rgba(255, 242, 233, 0.5);
      border-top: 1px solid rgba(252, 190, 195, 0.2);
    }

    .chat-input {
      flex: 1;
      padding: 10px 15px;
      border-radius: 25px;
      border: 1px solid #FCBEC3;
      background: white;
      outline: none;
      font-size: 0.9rem;
    }

    .send-btn {
      background: linear-gradient(135deg, #FCBEC3, #F5A0A8);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      transform: scale(1.1) rotate(10deg);
    }

    /* 小卖部页面 */
    .shop-feed {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .shop-item {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(207, 222, 227, 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .shop-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(252, 190, 195, 0.25);
    }

    .shop-image {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: linear-gradient(45deg, #FFF2E9, #CFDEE3);
    }

    .shop-info {
      padding: 10px 12px;
    }

    .shop-name {
      font-weight: 600;
      color: #8E656F;
      font-size: 0.9rem;
    }

    .shop-price {
      color: #FCBEC3;
      font-weight: 700;
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .save-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    /* 管理员按钮 */
    .admin-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 8px 16px;
      border: 1px solid rgba(252, 190, 195, 0.3);
      display: flex;
      gap: 8px;
      z-index: 100;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .admin-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .admin-btn:hover {
      background: rgba(252, 190, 195, 0.2);
    }

    @media (max-width: 600px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .shop-feed {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .nav-buttons {
        flex-wrap: wrap;
      }
      
      .nav-btn {
        font-size: 0.75rem;
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="ins-background"></div>
  <div class="geometric-lines"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="main-container">

    <!-- 导航按钮 -->

    <!-- 页面内容 -->

            </div>
            <div class="gallery-item">
              <div class="gallery-img" style="background: linear-gradient(45deg, #FCBEC3, #FFF2E9); display: flex; align-items: center; justify-content: center; font-size: 2rem;">🌸</div>

            </div>
            <div class="gallery-item">
              <div class="gallery-img" style="background: linear-gradient(45deg, #FFF2E9, #FCBEC3); display: flex; align-items: center; justify-content: center; font-size: 2rem;">💕</div>

          <div class="shop-item" style="position: relative;">
            <button class="save-btn">♡</button>
            <div class="shop-image" style="background: linear-gradient(45deg, #CFDEE3, #FFF2E9); display: flex; align-items: center; justify-content: center; font-size: 3rem;">📸</div>
            <div class="shop-info">
              <div class="shop-name">写真明信片</div>
              <div class="shop-price">¥68</div>
            </div>

          <div class="shop-item" style="position: relative;">
            <button class="save-btn">♡</button>
            <div class="shop-image" style="background: linear-gradient(45deg, #FFF2E9, #FCBEC3); display: flex; align-items: center; justify-content: center; font-size: 3rem;">🔑</div>
            <div class="shop-info">
              <div class="shop-name">甜心钥匙扣</div>
              <div class="shop-price">¥48</div>
            </div>

    </div>
  </div>

  <!-- 管理员控制面板 -->
  <div class="admin-control" id="adminPanel">
    <button class="admin-btn" id="adminToggleBtn" title="管理员模式">🔑</button>
    <button class="admin-btn" id="uploadImageBtn" title="更换图片" style="display: none;">📷</button>
    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
    <button class="admin-btn" id="editProfileBtn" title="编辑资料" style="display: none;">✏️</button>
  </div>

  <script>
    (function() {
      // 光标效果
      const glow = document.getElementById('cursorGlow');
      document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
        glow.style.opacity = 1;
      });
      document.addEventListener('mouseleave', () => { glow.style.opacity = 0; });

      // 页面切换
      const navButtons = document.querySelectorAll('.nav-btn');
      const pages = document.querySelectorAll('.page');

      navButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const targetPage = btn.getAttribute('data-page');
          
          navButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          pages.forEach(page => {
            page.classList.remove('active');
            if (page.id === targetPage + 'Page') {
              page.classList.add('active');
            }
          });
        });
      });

      // 点赞按钮
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          if (this.textContent === '🤍') {
            this.textContent = '❤️';
            this.style.transform = 'scale(1.3)';
            setTimeout(() => { this.style.transform = 'scale(1)'; }, 200);
          } else {
            this.textContent = '🤍';
          }
        });
      });

      // 收藏按钮
      document.querySelectorAll('.save-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          if (this.textContent === '♡') {
            this.textContent = '♥';
          } else {
            this.textContent = '♡';
          }
        });
      });

      // 管理员功能
      let isAdmin = false;
      const ADMIN_PASSWORD = "6992Joker";
      
      const adminToggleBtn = document.getElementById('adminToggleBtn');
      const uploadImageBtn = document.getElementById('uploadImageBtn');
      const editProfileBtn = document.getElementById('editProfileBtn');
      const imageUpload = document.getElementById('imageUpload');

      if (localStorage.getItem('ins_admin') === 'true') {
        enableAdminFeatures();
      }

      adminToggleBtn.addEventListener('click', () => {
        if (isAdmin) {
          disableAdminFeatures();
          localStorage.removeItem('ins_admin');
        } else {
          const pass = prompt('请输入管理员密码：');
          if (pass === ADMIN_PASSWORD) {
            enableAdminFeatures();
            localStorage.setItem('ins_admin', 'true');
            alert('✨ 管理员模式已开启');
          } else if (pass !== null) {
            alert('密码错误 ❌');
          }
        }
      });

      function enableAdminFeatures() {
        isAdmin = true;
        uploadImageBtn.style.display = 'block';
        editProfileBtn.style.display = 'block';
        adminToggleBtn.textContent = '🔓';
      }

      function disableAdminFeatures() {
        isAdmin = false;
        uploadImageBtn.style.display = 'none';
        editProfileBtn.style.display = 'none';
        adminToggleBtn.textContent = '🔑';
      }

      uploadImageBtn.addEventListener('click', () => {
        imageUpload.click();
      });

      imageUpload.addEventListener('change', (e) => {
        if (!isAdmin) return;
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            document.getElementById('mainGalleryImg').src = event.target.result;
            document.getElementById('avatarImage').src = event.target.result;
            localStorage.setItem('profile_image', event.target.result);
          };
          reader.readAsDataURL(file);
        }
      });

      editProfileBtn.addEventListener('click', () => {
        if (!isAdmin) return;
        const newName = prompt('修改用户名:', document.getElementById('displayName').textContent);
        if (newName) {
          document.getElementById('displayName').textContent = newName;
          localStorage.setItem('display_name', newName);
        }
        const newBio = prompt('修改简介:', document.getElementById('displayBio').textContent);
        if (newBio) {
          document.getElementById('displayBio').textContent = newBio;
          localStorage.setItem('display_bio', newBio);
        }
        const newIntro = prompt('修改介绍:', document.getElementById('introDescription').innerHTML.replace(/<br>/g, '\n'));
        if (newIntro) {
          document.getElementById('introDescription').innerHTML = newIntro.replace(/\n/g, '<br>');
          localStorage.setItem('intro_desc', newIntro);
        }
      });

      // 加载存储
      function loadStoredData() {
        const savedImage = localStorage.getItem('profile_image');
        if (savedImage) {
          document.getElementById('mainGalleryImg').src = savedImage;
          document.getElementById('avatarImage').src = savedImage;
        }
        const savedName = localStorage.getItem('display_name');
        if (savedName) document.getElementById('displayName').textContent = savedName;
        const savedBio = localStorage.getItem('display_bio');
        if (savedBio) document.getElementById('displayBio').textContent = savedBio;
        const savedIntro = localStorage.getItem('intro_desc');
        if (savedIntro) document.getElementById('introDescription').innerHTML = savedIntro.replace(/\n/g, '<br>');
      }

      // DeepSeek API 聊天
      const chatMessages = document.getElementById('chatMessages');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');

      const DEEPSEEK_API_KEY = "sk-74b087b3bf074a8dab3f97cbaf536a89";
      const API_URL = "https://api.deepseek.com/chat/completions";
      
      const SYSTEM_PROMPT = "你是「剧中人」，一个甜美可爱的虚拟偶像。说话温柔、带语气词“呀”“呢”“哦”，喜欢用颜文字和💕🍰🌸。回答要像贴心朋友，保持可爱治愈风格。用户是你粉丝，请用中文回复，每次回复不超过80字。";

      function getCurrentTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      }

      async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;
        
        appendMessage('user', message);
        userInput.value = '';
        
        if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === "sk-你的API密钥") {
          appendMessage('ai', '请先配置DeepSeek API密钥哦～🔑');
          return;
        }

        const loadingMsg = document.createElement('div');
        loadingMsg.className = 'message ai';
        loadingMsg.innerHTML = '正在输入...<div class="message-time">' + getCurrentTime() + '</div>';
        chatMessages.appendChild(loadingMsg);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
            },
            body: JSON.stringify({
              model: "deepseek-chat",
              messages: [
                { role: "system", content: SYSTEM_PROMPT },
                { role: "user", content: message }
              ],
              temperature: 0.9,
              max_tokens: 150
            })
          });

          if (loadingMsg) loadingMsg.remove();

          if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || '请求失败');
          }

          const data = await response.json();
          const aiReply = data.choices[0].message.content;
          appendMessage('ai', aiReply);
        } catch (error) {
          if (loadingMsg) loadingMsg.remove();
          appendMessage('ai', `唔，网络迷路了～${error.message}🌸`);
        }
      }

      function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerHTML = text + '<div class="message-time">' + getCurrentTime() + '</div>';
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      sendBtn.addEventListener('click', sendMessage);
      userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      // 初始化
      loadStoredData();
      
      window.addEventListener('load', () => {
        if (localStorage.getItem('ins_admin') === 'true') {
          enableAdminFeatures();
        }
      });
    })();
  </script>
</body>
</html>
